<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>VigilCLI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Font scale ── */
    :root { --font-scale: 1.0; }

    /* ── Dark theme (default) ── */
    :root[data-theme="dark"] {
      --bg-app:              rgba(16, 16, 22, 0.93);
      --border-app:          rgba(255, 255, 255, 0.07);
      --border-header:       rgba(255, 255, 255, 0.05);
      --logo-gradient:       linear-gradient(135deg, #6c6cff 0%, #a06cff 100%);
      --text-primary:        #e8e8f0;
      --text-title:          #b0b0d0;
      --text-count:          #606080;
      --text-count-active:   #8888cc;
      --text-menu-btn:       #606080;
      --bg-menu-btn-hover:   rgba(255, 255, 255, 0.08);
      --text-menu-btn-hover: #c8c8e8;
      --scrollbar-thumb:     rgba(255, 255, 255, 0.1);
      --scrollbar-thumb-hover: rgba(255, 255, 255, 0.2);
      --text-empty:          #404060;
      --text-empty-title:    #505070;
      --text-empty-sub:      #383858;
      --bg-card:             rgba(32, 32, 46, 0.75);
      --border-card:         rgba(255, 255, 255, 0.055);
      --bg-card-hover:       rgba(42, 42, 62, 0.88);
      --border-card-hover:   rgba(110, 110, 190, 0.22);
      --border-error:        rgba(255, 80, 80, 0.28);
      --border-attention:    rgba(80, 220, 100, 0.2);
      --border-notification: rgba(240, 190, 60, 0.22);
      --text-agent-name:     #c8c8e8;
      --text-card-title:     #b0b0d8;
      --text-cwd:            #5c5c84;
      --text-cwd-sub:        #434360;
      --text-elapsed:        #454565;
      --text-host:           #6868a0;
      --bg-host:             rgba(100, 100, 160, 0.15);
      --text-dnd:            #a08060;
      --bg-dnd:              rgba(60, 40, 0, 0.4);
      --border-dnd:          rgba(200, 130, 30, 0.12);
    }

    /* ── Light theme ── */
    :root[data-theme="light"] {
      --bg-app:              rgba(245, 245, 250, 0.97);
      --border-app:          rgba(0, 0, 0, 0.08);
      --border-header:       rgba(0, 0, 0, 0.06);
      --logo-gradient:       linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      --text-primary:        #1a1a2e;
      --text-title:          #444466;
      --text-count:          #8888aa;
      --text-count-active:   #5555aa;
      --text-menu-btn:       #888899;
      --bg-menu-btn-hover:   rgba(0, 0, 0, 0.06);
      --text-menu-btn-hover: #333355;
      --scrollbar-thumb:     rgba(0, 0, 0, 0.12);
      --scrollbar-thumb-hover: rgba(0, 0, 0, 0.22);
      --text-empty:          #bbbbcc;
      --text-empty-title:    #aaaacc;
      --text-empty-sub:      #ccccdd;
      --bg-card:             rgba(255, 255, 255, 0.90);
      --border-card:         rgba(0, 0, 0, 0.06);
      --bg-card-hover:       rgba(235, 235, 248, 0.95);
      --border-card-hover:   rgba(80, 80, 200, 0.18);
      --border-error:        rgba(200, 40, 40, 0.25);
      --border-attention:    rgba(40, 160, 70, 0.25);
      --border-notification: rgba(180, 130, 20, 0.25);
      --text-agent-name:     #2a2a4a;
      --text-card-title:     #3a3a5a;
      --text-cwd:            #7878a0;
      --text-cwd-sub:        #9090b8;
      --text-elapsed:        #9090b0;
      --text-host:           #6666a0;
      --bg-host:             rgba(100, 100, 180, 0.10);
      --text-dnd:            #886030;
      --bg-dnd:              rgba(255, 240, 210, 0.9);
      --border-dnd:          rgba(180, 110, 20, 0.15);
    }

    /* ── Purple theme ── */
    :root[data-theme="purple"] {
      --bg-app:              rgba(22, 14, 36, 0.95);
      --border-app:          rgba(180, 130, 255, 0.10);
      --border-header:       rgba(160, 100, 255, 0.08);
      --logo-gradient:       linear-gradient(135deg, #aa44ff 0%, #ff44cc 100%);
      --text-primary:        #ede0ff;
      --text-title:          #c8aaf0;
      --text-count:          #7a5a9a;
      --text-count-active:   #bb88ff;
      --text-menu-btn:       #7a5a9a;
      --bg-menu-btn-hover:   rgba(160, 100, 255, 0.12);
      --text-menu-btn-hover: #ddc8ff;
      --scrollbar-thumb:     rgba(160, 100, 255, 0.15);
      --scrollbar-thumb-hover: rgba(160, 100, 255, 0.28);
      --text-empty:          #5a3a7a;
      --text-empty-title:    #7a5a9a;
      --text-empty-sub:      #4a2a6a;
      --bg-card:             rgba(40, 24, 64, 0.80);
      --border-card:         rgba(160, 100, 255, 0.10);
      --bg-card-hover:       rgba(55, 34, 82, 0.90);
      --border-card-hover:   rgba(160, 100, 255, 0.30);
      --border-error:        rgba(255, 80, 80, 0.28);
      --border-attention:    rgba(80, 220, 100, 0.2);
      --border-notification: rgba(240, 190, 60, 0.22);
      --text-agent-name:     #ddc8ff;
      --text-card-title:     #c8aae8;
      --text-cwd:            #7a5a9a;
      --text-cwd-sub:        #5a3a7a;
      --text-elapsed:        #6a4a8a;
      --text-host:           #9966cc;
      --bg-host:             rgba(140, 80, 200, 0.18);
      --text-dnd:            #cc88ff;
      --bg-dnd:              rgba(50, 20, 80, 0.6);
      --border-dnd:          rgba(180, 100, 255, 0.15);
    }

    /* ── Ocean theme ── */
    :root[data-theme="ocean"] {
      --bg-app:              rgba(8, 20, 36, 0.95);
      --border-app:          rgba(60, 160, 255, 0.10);
      --border-header:       rgba(60, 150, 240, 0.08);
      --logo-gradient:       linear-gradient(135deg, #0088ff 0%, #00cccc 100%);
      --text-primary:        #d8f0ff;
      --text-title:          #88c8ee;
      --text-count:          #4a7a9a;
      --text-count-active:   #44ccff;
      --text-menu-btn:       #4a7a9a;
      --bg-menu-btn-hover:   rgba(60, 160, 255, 0.12);
      --text-menu-btn-hover: #b8e0ff;
      --scrollbar-thumb:     rgba(60, 160, 255, 0.15);
      --scrollbar-thumb-hover: rgba(60, 160, 255, 0.28);
      --text-empty:          #2a5a7a;
      --text-empty-title:    #3a6a8a;
      --text-empty-sub:      #1a4a6a;
      --bg-card:             rgba(14, 34, 58, 0.80);
      --border-card:         rgba(60, 150, 240, 0.10);
      --bg-card-hover:       rgba(20, 46, 76, 0.90);
      --border-card-hover:   rgba(60, 160, 255, 0.28);
      --border-error:        rgba(255, 80, 80, 0.28);
      --border-attention:    rgba(80, 220, 100, 0.2);
      --border-notification: rgba(240, 190, 60, 0.22);
      --text-agent-name:     #b8e0ff;
      --text-card-title:     #a0d0f0;
      --text-cwd:            #4a7a9a;
      --text-cwd-sub:        #2a5a7a;
      --text-elapsed:        #3a6080;
      --text-host:           #3399cc;
      --bg-host:             rgba(40, 120, 180, 0.18);
      --text-dnd:            #66ccff;
      --bg-dnd:              rgba(10, 30, 60, 0.6);
      --border-dnd:          rgba(60, 160, 255, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: calc(13px * var(--font-scale));
      background: transparent;
      overflow: hidden;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
    }

    .app {
      background: var(--bg-app);
      border: 1px solid var(--border-app);
      border-radius: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header (drag handle) ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 9px;
      -webkit-app-region: drag;
      border-bottom: 1px solid var(--border-header);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .logo {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--logo-gradient);
      flex-shrink: 0;
    }

    .title {
      font-size: calc(12px * var(--font-scale));
      font-weight: 600;
      color: var(--text-title);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .count {
      font-size: calc(11px * var(--font-scale));
      color: var(--text-count);
      font-variant-numeric: tabular-nums;
    }

    .count.has-active { color: var(--text-count-active); }

    .menu-btn {
      background: none;
      border: none;
      color: var(--text-menu-btn);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: calc(14px * var(--font-scale));
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .menu-btn:hover {
      background: var(--bg-menu-btn-hover);
      color: var(--text-menu-btn-hover);
    }

    /* ── Collapse / opacity icon buttons ── */
    .icon-btn {
      background: none;
      border: none;
      color: var(--text-menu-btn);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: calc(12px * var(--font-scale));
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .icon-btn:hover {
      background: var(--bg-menu-btn-hover);
      color: var(--text-menu-btn-hover);
    }

    /* ── Opacity panel ── */
    .opacity-panel {
      flex-shrink: 0;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border-header);
    }

    .opacity-panel.visible { display: flex; }

    .opacity-label {
      font-size: calc(11px * var(--font-scale));
      color: var(--text-count);
      flex-shrink: 0;
    }

    .opacity-slider {
      flex: 1;
      height: 3px;
      accent-color: var(--text-count-active);
      cursor: pointer;
    }

    .opacity-value {
      font-size: calc(11px * var(--font-scale));
      color: var(--text-count-active);
      font-variant-numeric: tabular-nums;
      min-width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Session list ── */
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .list::-webkit-scrollbar { width: 3px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }
    .list::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-empty);
      padding: 40px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 32px;
      opacity: 0.35;
      line-height: 1;
    }

    .empty-title {
      font-size: calc(13px * var(--font-scale));
      font-weight: 500;
      color: var(--text-empty-title);
    }

    .empty-sub {
      font-size: calc(11px * var(--font-scale));
      color: var(--text-empty-sub);
      line-height: 1.5;
    }

    /* ── Session card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 9px 11px 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-card-hover);
      transform: translateY(-1px);
    }

    .card:active { transform: translateY(0); }

    .card.state-error        { border-color: var(--border-error); }
    .card.state-attention    { border-color: var(--border-attention); }
    .card.state-notification { border-color: var(--border-notification); }

    /* ── Card header row ── */
    .card-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    .agent-icon {
      font-size: calc(13px * var(--font-scale));
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .agent-name {
      font-size: calc(12px * var(--font-scale));
      font-weight: 600;
      color: var(--text-agent-name);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state-badge {
      font-size: calc(10.5px * var(--font-scale));
      font-weight: 500;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.02em;
    }

    /* ── Pulsing activity dot ── */
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .dot.pulse {
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.7); }
    }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-enter {
      animation: cardSlideIn 0.22s ease-out forwards;
    }

    @keyframes cardSlideOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-8px); }
    }

    .card-exit {
      animation: cardSlideOut 0.18s ease-in forwards;
      pointer-events: none;
    }

    /* ── Session title (AI-generated or user-renamed) ── */
    .card-title {
      font-size: calc(12px * var(--font-scale));
      font-weight: 500;
      color: var(--text-card-title);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    /* ── CWD row ── */
    .card-cwd {
      font-size: calc(11px * var(--font-scale));
      color: var(--text-cwd);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
      font-family: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
    }

    /* Dimmer when there's already a title row above */
    .card-cwd.card-cwd-sub {
      font-size: calc(10.5px * var(--font-scale));
      color: var(--text-cwd-sub);
    }

    /* ── Subagent indicator row ── */
    .card-subagents {
      font-size: calc(10.5px * var(--font-scale));
      color: var(--text-count-active);
      margin-bottom: 4px;
      font-family: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", monospace;
    }

    /* ── Footer row ── */
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .elapsed {
      font-size: calc(10.5px * var(--font-scale));
      color: var(--text-elapsed);
      font-variant-numeric: tabular-nums;
    }

    .host-badge {
      font-size: calc(10px * var(--font-scale));
      color: var(--text-host);
      background: var(--bg-host);
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* ── DND bar ── */
    .dnd-bar {
      flex-shrink: 0;
      padding: 6px 12px;
      text-align: center;
      font-size: calc(11px * var(--font-scale));
      color: var(--text-dnd);
      background: var(--bg-dnd);
      border-top: 1px solid var(--border-dnd);
      display: none;
    }

    .dnd-bar.visible { display: block; }

    /* ── Collapsed state ── */
    .app.collapsed .list { display: none !important; }
    .app.collapsed .dnd-bar { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header" id="drag-handle">
      <div class="header-left">
        <div class="logo"></div>
        <span class="title">VigilCLI</span>
      </div>
      <div class="header-right">
        <span class="count" id="count"></span>
        <button class="icon-btn" id="opacity-btn" title="Opacity">◐</button>
        <button class="icon-btn" id="collapse-btn" title="Collapse">▾</button>
        <button class="menu-btn" id="menu-btn" title="Menu">···</button>
      </div>
    </div>

    <div class="opacity-panel" id="opacity-panel">
      <span class="opacity-label">透明度</span>
      <input class="opacity-slider" id="opacity-slider" type="range" min="0.1" max="1" step="0.05" value="1">
      <span class="opacity-value" id="opacity-value">100%</span>
    </div>

    <div class="list" id="list"></div>

    <div class="dnd-bar" id="dnd-bar">💤 Do Not Disturb</div>
  </div>

  <script src="list-renderer.js"></script>
</body>
</html>
