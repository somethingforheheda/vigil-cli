<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>VigilCLI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #000000;
      --t85:         rgba(255,255,255,0.85);
      --t70:         rgba(255,255,255,0.70);
      --t50:         rgba(255,255,255,0.50);
      --t40:         rgba(255,255,255,0.40);
      --t25:         rgba(255,255,255,0.25);
      --t10:         rgba(255,255,255,0.10);
      --hover:       rgba(255,255,255,0.06);
      --sep:         rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.13);
      --orange:      #D97857;
      --amber:       #FFB200;
      --green:       #66BF73;
      --red:         #FF4D4D;
      --font-scale:  1.0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: calc(13px * var(--font-scale));
      background: transparent;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      color: var(--t85);
    }

    /* ═══════════════════════════════════
       ORB — 52×52 breathing sphere
       ═══════════════════════════════════ */
    #orb-container {
      width: 52px; height: 52px;
      display: none;
      align-items: center; justify-content: center;
      cursor: grab;
    }
    #orb-container:active { cursor: grabbing; }
    body[data-mode="orb"] #orb-container { display: flex; }

    .orb {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1c1c1c, #000);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      animation: orbBreath 3s ease-in-out infinite;
    }
    .orb-icon { font-size: 9px; font-weight: 700; color: var(--orange); letter-spacing: .06em; }
    .orb-dots { display: flex; gap: 2px; align-items: center; }
    .orb-dot  { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.18); }
    .orb-dot.active { background: var(--orange); }
    .orb-dot.perm   { background: var(--amber); }
    .orb-dot.err    { background: var(--red); }

    @keyframes orbBreath {
      0%,100% { box-shadow: 0 0 8px rgba(217,120,87,.1); transform: scale(1); }
      50%     { box-shadow: 0 0 18px rgba(217,120,87,.35); transform: scale(1.04); }
    }
    .orb.s-active { animation: orbBreathActive 1.2s ease-in-out infinite; }
    .orb.s-perm   { animation: orbBreathPerm   0.8s ease-in-out infinite; }
    .orb.s-err    { animation: orbBreathErr    0.6s ease-in-out infinite; }
    @keyframes orbBreathActive {
      0%,100% { box-shadow: 0 0 8px rgba(217,120,87,.1); transform: scale(1); }
      50%     { box-shadow: 0 0 22px rgba(217,120,87,.45); transform: scale(1.05); }
    }
    @keyframes orbBreathPerm {
      0%,100% { box-shadow: 0 0 8px rgba(255,178,0,.1); transform: scale(1); }
      50%     { box-shadow: 0 0 22px rgba(255,178,0,.5); transform: scale(1.05); }
    }
    @keyframes orbBreathErr {
      0%,100% { box-shadow: 0 0 8px rgba(255,77,77,.1); transform: scale(1); }
      50%     { box-shadow: 0 0 22px rgba(255,77,77,.5); transform: scale(1.05); }
    }

    /* ═══════════════════════════════════
       CAPSULE — PEEK + PANEL
       ═══════════════════════════════════ */
    #cap {
      display: none;
      flex-direction: column;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      width: 300px;
      box-shadow: none;
      transition: width .42s cubic-bezier(.34,1.25,.64,1),
                  border-radius .35s cubic-bezier(.34,1.25,.64,1);
      will-change: width, border-radius;
    }
    body[data-mode="peek"]  #cap { display: flex; }
    body[data-mode="panel"] #cap { display: flex; width: 340px; border-radius: 14px; }

    /* ── Capsule bar (always visible) ── */
    #cap-bar {
      height: 40px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 12px 0 10px; gap: 7px;
      cursor: pointer;
      user-select: none;
    }
    body[data-mode="panel"] #cap-bar {
      border-bottom: 1px solid var(--sep);
      -webkit-app-region: drag;
    }

    #cap-ind {
      width: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--orange);
    }
    .ind-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: inline-block;
    }
    .ind-dot.g { background: var(--green); }
    .ind-dot.a { background: var(--amber); }
    .ind-dot.r { background: var(--red); }

    #cap-agent {
      font-size: calc(13px * var(--font-scale)); font-weight: 500;
      color: var(--t85); white-space: nowrap; flex-shrink: 0;
      max-width: 45%; overflow: hidden; text-overflow: ellipsis;
    }
    body[data-mode="panel"] #cap-agent { max-width: 55%; }
    #cap-line {
      flex: 1; height: 1px;
      background: var(--sep);
      position: relative; overflow: hidden; border-radius: 1px;
    }
    #cap-line.running::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      background-size: 200% 100%;
      animation: shimmer 1.8s linear infinite;
    }
    @keyframes shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }
    #cap-tool {
      font-size: calc(11px * var(--font-scale));
      font-family: "SFMono-Regular","SF Mono",Consolas,monospace;
      color: var(--amber); white-space: nowrap; flex-shrink: 0;
      max-width: 70px; overflow: hidden; text-overflow: ellipsis;
    }
    #cap-status {
      font-size: calc(10px * var(--font-scale));
      padding: 2px 6px; border-radius: 6px;
      background: rgba(255,255,255,.07); color: var(--t50);
      white-space: nowrap; flex-shrink: 0;
    }
    #cap-menu:hover { background: var(--hover); color: var(--t70); }

    /* ── Panel content (grows downward) ── */
    #cap-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .42s cubic-bezier(.34,1.25,.64,1);
      will-change: max-height;
    }

    /* ── Session list ── */
    #slist {
      overflow-y: auto;
      max-height: 440px;
    }
    #slist::-webkit-scrollbar { width: 3px; }
    #slist::-webkit-scrollbar-track { background: transparent; }
    #slist::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }
    #slist::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.15); }

    /* ── Session row (claude-island InstanceRow) ── */
    .srow {
      display: flex; align-items: center;
      gap: 10px; padding: 10px 14px 10px 8px;
      cursor: pointer;
      transition: background .12s;
      position: relative;
    }
    .srow:hover { background: var(--hover); }
    .srow + .srow::before {
      content: ''; position: absolute;
      top: 0; left: 8px; right: 14px;
      height: 1px; background: var(--sep);
    }
    /* State indicator (14px) */
    .sind {
      width: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    /* Text block */
    .sbody { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .stitle {
      font-size: calc(13px * var(--font-scale)); font-weight: 500;
      color: var(--t85);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ssub {
      font-size: calc(11px * var(--font-scale));
      color: var(--t40);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stool { color: var(--amber); font-family: "SFMono-Regular","SF Mono",Consolas,monospace; }
    /* Right side */
    .sright { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .stime {
      font-size: calc(11px * var(--font-scale));
      color: var(--t25); font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .stime.ta { color: var(--amber); opacity: .7; }
    .stime.tr { color: var(--red);   opacity: .7; }

    /* Status pill per row */
    .spill {
      font-size: calc(10px * var(--font-scale));
      padding: 2px 6px; border-radius: 6px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Row entry animation */
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .srow-new { animation: rowIn .25s cubic-bezier(.34,1.25,.64,1) both; }

    /* ── DND bar ── */
    #dnd-bar {
      padding: 5px 12px; text-align: center;
      font-size: calc(11px * var(--font-scale));
      color: rgba(255,178,0,.6);
      border-top: 1px solid var(--sep);
      display: none;
    }
    #dnd-bar.on { display: block; }
  </style>
</head>
<body>

  <!-- ORB mode: 52×52 -->
  <div id="orb-container">
    <div class="orb" id="orb">
      <span class="orb-icon">VC</span>
      <div class="orb-dots" id="orb-dots"></div>
    </div>
  </div>

  <!-- PEEK / PANEL: capsule that grows downward -->
  <div id="cap">
    <div id="cap-bar">
      <span id="cap-ind"><span class="ind-dot"></span></span>
      <span id="cap-agent">VigilCLI</span>
      <div id="cap-line"></div>
      <span id="cap-tool"></span>
      <span id="cap-status"></span>
    </div>
    <div id="cap-body">
      <div id="slist"></div>
      <div id="dnd-bar">💤 勿扰模式</div>
    </div>
  </div>

  <script src="list-renderer.js"></script>
</body>
</html>
