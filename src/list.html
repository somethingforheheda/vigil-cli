<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>VigilCLI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #000000;
      --t85:         rgba(255,255,255,0.85);
      --t70:         rgba(255,255,255,0.70);
      --t50:         rgba(255,255,255,0.50);
      --t40:         rgba(255,255,255,0.40);
      --t25:         rgba(255,255,255,0.25);
      --t10:         rgba(255,255,255,0.10);
      --hover:       rgba(255,255,255,0.06);
      --sep:         rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.13);
      --orange:      #D97857;
      --amber:       #FFB200;
      --green:       #66BF73;
      --red:         #FF4D4D;
      --font-scale:  1.0;
      --orb-outer:   46px;
      --orb-inner:   46px;
    }

    html, body { width: 100%; height: 100%; }
    html { background: transparent; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: calc(13px * var(--font-scale));
      background: transparent;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      color: var(--t85);
      position: relative;
      --expand-ms: 320ms;
      --collapse-ms: 280ms;
    }

    /* ═══════════════════════════════════
       ORB — 52×52 breathing sphere
       ═══════════════════════════════════ */
    #orb-container {
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      opacity: 0;
      visibility: hidden;
      z-index: 2;
    }
    body[data-mode="orb"] #orb-container,
    body[data-phase="expanding"] #orb-container {
      visibility: visible;
      opacity: 1;
    }

    .orb {
      width: var(--orb-inner); height: var(--orb-inner);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1c1c1c, #000);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      cursor: grab;
      animation: orbBreath 3s ease-in-out infinite;
      transform-origin: center;
      will-change: transform, opacity;
    }
    .orb:active { cursor: grabbing; }
    .orb-status {
      font-size: 14px; font-weight: 500;
      color: var(--t40); line-height: 1;
      min-height: 16px; display: flex; align-items: center; justify-content: center;
    }
    .orb-name {
      font-size: 8px; font-weight: 600;
      color: var(--t50); letter-spacing: .05em;
      text-transform: uppercase; line-height: 1;
    }
    .orb-dots { display: flex; gap: 2px; align-items: center; }
    .orb-dot  { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.18); }
    .orb-dot.active { background: var(--orange); }
    .orb-dot.perm   { background: var(--amber); }
    .orb-dot.err    { background: var(--red); }

    @keyframes orbBreath {
      0%,100% { box-shadow: 0 0 8px rgba(217,120,87,.1); }
      50%     { box-shadow: 0 0 18px rgba(217,120,87,.35); }
    }
    .orb.s-active { animation: orbBreathActive 1.2s ease-in-out infinite; }
    .orb.s-perm   { animation: orbBreathPerm   0.8s ease-in-out infinite; }
    .orb.s-err    { animation: orbBreathErr    0.6s ease-in-out infinite; }
    @keyframes orbBreathActive {
      0%,100% { box-shadow: 0 0 8px rgba(217,120,87,.1); }
      50%     { box-shadow: 0 0 22px rgba(217,120,87,.45); }
    }
    @keyframes orbBreathPerm {
      0%,100% { box-shadow: 0 0 8px rgba(255,178,0,.1); }
      50%     { box-shadow: 0 0 22px rgba(255,178,0,.5); }
    }
    @keyframes orbBreathErr {
      0%,100% { box-shadow: 0 0 8px rgba(255,77,77,.1); }
      50%     { box-shadow: 0 0 22px rgba(255,77,77,.5); }
    }

    /* ── ORB transition animations ── */
    @keyframes orbPopIn {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes orbExitOut {
      from { transform: scale(1);   opacity: 1; }
      to   { transform: scale(0.65); opacity: 0; }
    }
    @keyframes orbStatePulse {
      0%   { box-shadow: 0 0 0 rgba(217,120,87,.0); }
      40%  { box-shadow: 0 0 18px rgba(217,120,87,.6); }
      100% { box-shadow: 0 0 8px rgba(217,120,87,.1); }
    }
    .orb.pop-in   { animation: orbPopIn   .4s cubic-bezier(.34,1.36,.64,1) both; }
    .orb.exit-out { animation: orbExitOut .11s ease-in both; }
    .orb.state-pulse { animation: orbStatePulse .4s ease-out; }

    /* ═══════════════════════════════════
       CAPSULE — PEEK + PANEL
       ═══════════════════════════════════ */
    #cap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #050505 0%, #000 100%);
      border: 1px solid var(--border);
      border-radius: calc(var(--orb-outer) / 2);
      overflow: hidden;
      box-shadow: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 1;
      transition:
        border-radius var(--expand-ms) cubic-bezier(.22,1,.36,1),
        opacity 120ms linear;
      will-change: border-radius, opacity;
    }
    body[data-mode="panel"] #cap,
    body[data-phase="expanding"] #cap,
    body[data-phase="collapsing"] #cap {
      opacity: 1;
      visibility: visible;
    }
    body[data-mode="panel"] #cap { pointer-events: auto; border-radius: 14px; }
    body[data-phase="expanding"] #cap {
      pointer-events: none;
      border-radius: 14px;
    }
    body[data-phase="collapsing"] #cap {
      pointer-events: none;
      border-radius: calc(var(--orb-outer) / 2);
      transition:
        border-radius var(--collapse-ms) cubic-bezier(.4,0,.2,1),
        opacity 120ms linear;
    }

    /* ── Capsule bar (always visible) ── */
    #cap-bar {
      height: 40px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 12px 0 10px; gap: 7px;
      cursor: pointer;
      user-select: none;
      opacity: 0;
      transform: translateY(-5px) scale(.985);
      transition:
        opacity 140ms cubic-bezier(.2,.8,.2,1),
        transform 180ms cubic-bezier(.2,.8,.2,1);
    }
    body[data-mode="panel"] #cap-bar {
      border-bottom: 1px solid var(--sep);
      cursor: grab;
    }
    body[data-mode="panel"] #cap-bar:active { cursor: grabbing; }

    #cap-ind {
      width: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--orange);
    }
    .ind-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: inline-block;
    }
    .ind-dot.g { background: var(--green); }
    .ind-dot.a { background: var(--amber); }
    .ind-dot.r { background: var(--red); }

    #cap-agent {
      font-size: calc(13px * var(--font-scale)); font-weight: 500;
      color: var(--t85); white-space: nowrap; flex-shrink: 0;
      max-width: 45%; overflow: hidden; text-overflow: ellipsis;
    }
    body[data-mode="panel"] #cap-agent { max-width: 55%; }
    #cap-line {
      flex: 1; height: 1px;
      background: var(--sep);
      position: relative; overflow: hidden; border-radius: 1px;
    }
    #cap-line.running::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      background-size: 200% 100%;
      animation: shimmer 1.8s linear infinite;
    }
    @keyframes shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }
    #cap-tool {
      font-size: calc(11px * var(--font-scale));
      font-family: "SFMono-Regular","SF Mono",Consolas,monospace;
      color: var(--amber); white-space: nowrap; flex-shrink: 0;
      max-width: 70px; overflow: hidden; text-overflow: ellipsis;
    }
    #cap-status {
      font-size: calc(10px * var(--font-scale));
      padding: 2px 6px; border-radius: 6px;
      background: rgba(255,255,255,.07); color: var(--t50);
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Panel content (grows downward) ── */
    #cap-body {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px) scaleY(.96);
      transform-origin: top center;
      transition:
        opacity 160ms cubic-bezier(.2,.8,.2,1),
        transform 180ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    body[data-content="visible"] #cap-bar,
    body[data-content="visible"] #cap-body {
      opacity: 1;
      transform: none;
    }
    body[data-phase="expanding"][data-content="visible"] #cap-bar,
    body[data-phase="expanding"][data-content="visible"] #cap-body {
      transition-delay: 70ms;
    }
    body[data-phase="collapsing"] #cap-bar,
    body[data-phase="collapsing"] #cap-body {
      transition-delay: 0ms;
    }

    /* ── Session list ── */
    #slist {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      max-height: 440px;
    }
    #slist::-webkit-scrollbar { width: 3px; }
    #slist::-webkit-scrollbar-track { background: transparent; }
    #slist::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }
    #slist::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.15); }

    /* ── Session row (claude-island InstanceRow) ── */
    .srow {
      display: flex; align-items: center;
      gap: 10px; padding: 10px 14px 10px 8px;
      cursor: pointer;
      transition: background .12s;
      position: relative;
    }
    .srow:hover { background: var(--hover); }
    .srow + .srow::before {
      content: ''; position: absolute;
      top: 0; left: 8px; right: 14px;
      height: 1px; background: var(--sep);
    }
    /* State indicator (14px) */
    .sind {
      width: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    /* Text block */
    .sbody { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .stitle {
      font-size: calc(13px * var(--font-scale)); font-weight: 500;
      color: var(--t85);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ssub {
      font-size: calc(11px * var(--font-scale));
      color: var(--t40);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stool { color: var(--amber); font-family: "SFMono-Regular","SF Mono",Consolas,monospace; }
    /* Right side */
    .sright { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .stime {
      font-size: calc(11px * var(--font-scale));
      color: var(--t25); font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .stime.ta { color: var(--amber); opacity: .7; }
    .stime.tr { color: var(--red);   opacity: .7; }

    /* Status pill per row */
    .spill {
      font-size: calc(10px * var(--font-scale));
      padding: 2px 6px; border-radius: 6px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Row entry animation */
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .srow-new { animation: rowIn .25s cubic-bezier(.34,1.25,.64,1) both; }

    /* ── DND bar ── */
    #dnd-bar {
      padding: 5px 12px; text-align: center;
      font-size: calc(11px * var(--font-scale));
      color: rgba(255,178,0,.6);
      border-top: 1px solid var(--sep);
      display: none;
    }
    #dnd-bar.on { display: block; }
  </style>
</head>
<body>

  <!-- ORB mode: 52×52 -->
  <div id="orb-container">
    <div class="orb" id="orb">
      <div class="orb-status" id="orb-status">·</div>
      <div class="orb-name"   id="orb-name">VC</div>
      <div class="orb-dots"   id="orb-dots"></div>
    </div>
  </div>

  <!-- PEEK / PANEL: capsule that grows downward -->
  <div id="cap">
    <div id="cap-bar">
      <span id="cap-ind"><span class="ind-dot"></span></span>
      <span id="cap-agent">VigilCLI</span>
      <div id="cap-line"></div>
      <span id="cap-tool"></span>
      <span id="cap-status"></span>
    </div>
    <div id="cap-body">
      <div id="slist"></div>
      <div id="dnd-bar">💤 勿扰模式</div>
    </div>
  </div>

  <script src="list-renderer.js"></script>
</body>
</html>
